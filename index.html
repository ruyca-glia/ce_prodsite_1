<!DOCTYPE html>
<html>
  <head>
    <script async src="https://api.glia.com/salemove_integration.js"></script>

    <script>
      console.log("[Glia Debug] 1. Script parsed, setting up Glia waiter...");

      window.smReady = function() {
        console.log("[Glia Debug] 2. smReady() triggered. Requesting Glia API...");
        
        sm.getApi({ version: 'v1' }).then(function(salemove) {
          console.log("[Glia Debug] 3. sm.getApi() resolved. Glia API is available.");

          // --- 1. CONFIGURATION CHANGES ---
          // We REMOVED 'salemove.config.isCustomTheme = true'
          // This ensures the Glia Bubble and default Video UI appear automatically.

          // --- 2. BUTTON LOGIC ---
          function setupButtons() {
            // Button to OPEN the Modal
            const openModalBtn = document.getElementById('open-modal-btn');
            const modal = document.getElementById('tos-modal');

            if (openModalBtn && modal) {
                openModalBtn.addEventListener('click', function() {
                    modal.showModal(); 
                });
            }

            // Button to ACCEPT and START Video (Inside the Modal)
            const acceptBtn = document.getElementById('accept-btn');
            
            if (acceptBtn) {
              acceptBtn.addEventListener('click', function() {
                console.log("[Glia Debug] Consent Accepted. Requesting Native Glia Video...");
                
                // Close the modal
                if(modal) modal.close();

                // Trigger Glia Video Engagement
                // Since we are using the Native UI, Glia will pop open its own video window.
                salemove.requestEngagement('video')
                    .then(engagement => {
                        console.log("[Glia Debug] Engagement request sent successfully.");
                    })
                    .catch(error => {
                        console.error('[Glia Debug] Engagement Failed:', error);
                        // Optional: Alert the user if no agents are available
                        if (error.cause === salemove.ERRORS.OPERATOR_UNAVAILABLE) {
                            alert("Lo sentimos, no hay agentes disponibles en este momento.");
                        }
                    });
              });
            }

            // Cancel Button logic
            const cancelBtn = document.getElementById('cancel-btn');
            if (cancelBtn && modal) {
                cancelBtn.addEventListener('click', () => modal.close());
            }

            // --- NEW: Button to show Visitor Code ---
            const getCodeBtn = document.getElementById('get-code-btn');
            if (getCodeBtn) {
              getCodeBtn.addEventListener('click', function() {
                console.log("[Glia Debug] Injecting <sm-visitor-code> into DOM...");
                const code = document.createElement('sm-visitor-code');
                document.body.appendChild(code);
              });
            }
          }

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupButtons);
          } else {
            setupButtons();
          }

        }).catch(function(err) {
          console.error("[Glia Debug] ERROR: Failed to get Glia API:", err);
        });
      };

      // Standard Poller
      function checkGliaReady() {
        if (window.sm && typeof window.sm.getApi === 'function') {
           window.smReady();
        } else {
           setTimeout(checkGliaReady, 100);
        }
      }

      checkGliaReady();
    </script>

    <title>CE Testing Site</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <style>
      h1 { color:#7C19DD; font-family:roboto; text-align:center; }
      img { width:50%; display: block; margin: 0 auto; }
      .nav-container { text-align: center; margin-top: 20px; }
      .btn {
        padding: 10px 20px;
        background-color: #7C19DD;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-family: roboto, sans-serif;
        border: none;
        cursor: pointer;
        font-size: 16px;
        display: inline-block;
        margin: 5px;
      }
      .btn:hover { opacity: 0.9; }

      /* Dialog Styling */
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      /* Basic form styling for neatness */
      .form-group {
        margin-bottom: 10px;
      }
    </style>
    <link rel="stylesheet" href="./static/css/styles.css">
    <script type="text/javascript" src="./static/js/client-app.js" defer></script>
  </head>

  <body>
    <center>
      <img src="images/Full LOGO_black.png" alt="CE logo" style="width:750px">
    </center>

    <dialog id="tos-modal" style="padding: 20px; border-radius: 8px; border: 1px solid #7C19DD;">
      <h2 style="color: #7C19DD;">Finalizar desafilacion</h2>
      <p>Para continuar con el proceso de desafiliacion, por favor contacta a uno de nuestros agentes.</p>
  
      <div style="text-align: right; margin-top: 20px;">
        <button id="cancel-btn" class="btn" style="background-color: #ccc;">Cancelar</button>
        <button id="accept-btn" class="btn">Aceptar y continuar</button>
      </div>
    </dialog>

    <h1 id="title" class="title">Welcome to our PROD site!</h1>

    <div class="nav-container">
      <button id="open-modal-btn" class="btn">Iniciar Proceso (Open Modal)</button>
    </div>

    <div class="nav-container">
      <button id="get-code-btn" class="btn">Obtener Código de CoBrowsing</button>
    </div>

    <div class="nav-container">
      <a href="./static/other_page.html" class="btn">Go to Cat Facts</a>
    </div>
    
    <div class="nav-container">
      <a href="./static/desafilacion.html" id="redirect-link" class="btn">Go to desafilacion</a>
    </div>

    <hr style="margin: 30px auto; width: 80%; border: 1px solid #ddd;">

    <div class="nav-container">
      <form id="visitor-form">
        <div class="form-group">
          <label for="visitor-name">Name:</label>
          <input type="text" id="visitor-name" name="visitor-name">
        </div>
        <div class="form-group">
          <label for="visitor-email">Email:</label>
          <input type="email" id="visitor-email" name="visitor-email">
        </div>
        <div class="form-group">
          <label for="service-rating">How satisfied were you with the service?</label>
          <input type="number" id="service-rating" name="service-rating" min="1" max="10"> 
        </div>
      </form>
    </div>

    <div class="nav-container">
      <button id="btn-hello" class="btn">hello</button>
      <button id="btn-goodbye" class="btn">good bye</button>
      <button id="btn-interns" class="btn">go interns!</button>
    </div>

    <div class="nav-container">
      <button id="btn-secret" class="btn">Reveal Secret</button>
      <div id="secret-message-container"></div>
    </div>

    <script>
      document.getElementById('btn-secret').addEventListener('click', function() {
        // Prevent creating multiple messages if clicked multiple times
        if (!document.getElementById('secret-message')) {
          const secretPara = document.createElement('p');
          secretPara.id = 'secret-message';
          secretPara.textContent = 'this is a secret message!';
          
          document.getElementById('secret-message-container').appendChild(secretPara);
        }
      });
    </script>
  </body>
</html>
